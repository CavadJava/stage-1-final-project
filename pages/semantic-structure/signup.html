<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | Final Project | brainwave.io</title>
</head>

<body>
<!-- HEADER START  -->
<header>
    <p class="title">Brainwave</p>
</header>
<!-- HEADER END  -->

<!-- MAIN START  -->
<main>
    <!-- SECTION START  -->
    <section>
        <div class="hero">
            <h2 class="hero-title ">Sign up</h2>
            <p class="hero-description">To get started, you need to sign up here.</p>
        </div>
        <div class="signup-container">
            <form>
                <div class="container">
                    <label for="name">First & Last Name</label>
                    <input type="text" id="name" placeholder="i.e. John Doe">
                </div>

                <div class="container">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="i.e. john@mail.com">
                </div>

                <div class="container">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="********">
                </div>

                <div class="container">
                    <label for="password">Confirm Password</label>
                    <input type="password" id="password" placeholder="********">
                </div>
                <button class="create-account-btn">Create an account</button>
            </form>
        </div>

        <p class="login-text">Already have an account? <a href="#" class="login-link">Sign in now</a></p>
    </section>


    <!-- SECTION END  -->
</main>
<!-- MAIN END  -->

<!-- FOOTER START  -->

<!-- FOOTER END  -->
</body>

</html>
