<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login Page | Final Project | brainwave.io</title>

</head>

<body>
<!-- HEADER START  -->
<header>
    <p class="title-header">Brainwave.io</p>
</header>
<!-- HEADER END  -->

<!-- SECTION START  -->
<section class="hero">
    <div class="hero-container">
        <h1 class="title">Login</h1>
        <p class="description">To get started, you need to sign in here.</p>
    </div>

    <div class="login-container">
        <form>
            <div class="login-email">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="i.e. john@mail.com" required>
            </div>

            <div class="login-password">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="********" required>
            </div>

            <div class="sign-in">
                <button type="submit">Sign In</button>
            </div>
        </form>

    </div>
    <p class="account-text">Don’t have an account?
        <a href="#" class="account-link">Create an account</a>
    </p>
</section>
<!-- SECTION END  -->

<!-- FOOTER START  -->
<footer>

</footer>
<!-- FOOTER END  -->
</body>

</html>
